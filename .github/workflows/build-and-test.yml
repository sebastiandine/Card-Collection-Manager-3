name: Build, Test, and Package

on:
  push:
    branches-ignore:
      - master

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux build + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          ninja-build
          pkg-config
          libgtk-3-dev
          libwxgtk3.2-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCCM_BUILD_TESTS=ON -DCCM_USE_SYSTEM_WX=ON

      - name: Build
        run: cmake --build build --parallel 3

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Remove test executable from bundle
        run: rm -f build/bin/ccm_core_tests

      - name: Verify runtime dependencies are resolved
        run: |
          for f in build/bin/*; do
            [ -f "$f" ] || continue
            if file "$f" | grep -q "ELF"; then
              echo "Checking $f"
              ldd "$f"
              if ldd "$f" | grep -q "not found"; then
                echo "Missing runtime dependency detected in $f"
                exit 1
              fi
            fi
          done

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccm3-linux
          path: build/bin/*
          if-no-files-found: error

  build-windows:
    name: Windows build + tests
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-wxwidgets3.2-msw

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCCM_BUILD_TESTS=ON -DCCM_USE_SYSTEM_WX=ON

      - name: Build
        run: cmake --build build --parallel 3

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Collect runtime DLL dependencies
        run: |
          rm -f deps.txt
          for f in build/bin/*.exe build/bin/*.dll; do
            [ -e "$f" ] || continue
            ldd "$f" | awk '/\/ucrt64\/bin\// { print $3 }' >> deps.txt
          done
          sort -u deps.txt | while read -r dep; do
            [ -f "$dep" ] && cp -n "$dep" build/bin/
          done

      - name: Verify runtime dependencies are resolved
        run: |
          for f in build/bin/*.exe build/bin/*.dll; do
            [ -e "$f" ] || continue
            echo "Checking $f"
            ldd "$f"
            if ldd "$f" | grep -q "not found"; then
              echo "Missing runtime dependency detected in $f"
              exit 1
            fi
          done

      - name: Remove test executable from bundle
        run: rm -f build/bin/ccm_core_tests.exe build/bin/ccm_core_tests

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccm3-windows
          path: build/bin/*
          if-no-files-found: error
